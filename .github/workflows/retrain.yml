name: Monthly Retrain

on:
  schedule:
    - cron: "0 2 1 * *"  # 2am UTC on the 1st of every month
  workflow_dispatch:       # also allows manual trigger from GitHub UI

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest HDB data
        run: python3 src/fetch_data.py

      - name: Rebuild features with lat/lon
        run: python3 src/features_v2.py

      - name: Retrain model
        run: python3 src/train_v2.py

      - name: Update app RMSE numbers
        run: python3 src/update_rmse.py

      - name: Commit updated models and data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/xgboost.joblib models/linear_regression.joblib
          git add models/feature_columns.json
          git add data/resale-flat-prices.csv data/processed_v2.csv
          git add app/main.py
          git diff --staged --quiet || git commit -m "chore: monthly retrain $(date +'%Y-%m')"
          git push
